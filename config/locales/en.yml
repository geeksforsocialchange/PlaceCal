    event_row:
      online: "Online"
    home:
      description: "Find community groups, venues and events near you. PlaceCal aggregates thousands of events from hundreds of local organisations across the UK."
      hero_title: "Find community groups, venues and events near you."
      hero_subtitle: "PlaceCal aggregates thousands of events and activities from hundreds of local community organisations across the UK. This is the directory for all of it — search by place, by interest, or browse the map."
      stats:
        # Partner/Partnership/Neighbourhood labels come from model_name.human;
        # only the non-model "this month" label lives here.
        events: "Events this month"
      partnerships:
        kicker: "Partnerships"
        heading: "Community hubs running on PlaceCal"
        see_all: "See all partnerships"
      activity:
        kicker: "Activity"
        heading: "Recently joined PlaceCal"
        browse_all: "Browse all partners"
      events:
        kicker: "Tonight & this week"
        heading: "Happening around the UK"
        filter_by_place: "Filter events by place"
      cta:
        what_is:
          heading: "What is PlaceCal?"
          body: "PlaceCal is an online calendar which lists events and activities by and for members of local communities, curated around interests and locality."
          link: "Our story"
        run:
          heading: "Run PlaceCal in your community"
          body: "Setting up a PlaceCal means a dedicated website for your community, connected to the directory. We work with you on the ground to build partnerships with local venues and organisers."
          link: "Get in touch"
    events:
      index:
        description: "Discover %{count} upcoming events and activities from community organisations across the UK on PlaceCal."
        hero_title: "Events on PlaceCal"
        hero_subtitle: "A nationwide event feed is a lot. Narrow down by place, interest, or partnership to see what's coming up near you."
        kicker: "%{count} upcoming events across the UK"
        search_placeholder: "Event name or keyword…"
        period_label: "Time range"
        periods:
          day: "Today"
          week: "This week"
          month: "This month"
          future: "All upcoming"
        period_phrases:
          day: " today"
          week: " this week"
          month: " this month"
          future: ""
        results:
          none: "No events%{period}"
          count:
            one: "%{count} event%{period}"
            other: "%{count} events%{period}"
        empty: "No events found%{period}."
        show_all: "Show all upcoming events"
    pages:
      privacy:
        title: "PlaceCal Privacy Policy"
        breadcrumb: "Privacy"
        document_title: "Privacy Policy"
      terms_of_use:
        title: "PlaceCal Terms of Use"
        breadcrumb: "Terms"
        document_title: "Terms of Use"
      our_story:
        heading: "Our story"
        hero_title: "We set out to examine the causes of social isolation and loneliness within neighbourhoods, and figure out how to combat them."
        hero_lede: "PlaceCal grew out of years of work with age-friendly partnerships in Manchester. It started with listening, not building."
        start:
          eyebrow: "How we began"
          heading: "We started by listening"
          body:
            - "We spoke to over 6,000 people across Manchester and divested more than £200,000 in funds directly to community groups. We kept working with the age-friendly partnerships in Hulme and Moss Side, the pilot area where we are based, to find out why so many people felt cut off from their own neighbourhood."
            - "Social isolation is a major issue in the UK, where it is estimated that around two million older people experience loneliness. Studies show it is as bad for your health as smoking. Yet despite huge investment by councils and health providers in event listings, asset maps and directories, no one could reliably find out what was actually happening nearby."
        stats:
          - value: "6,000+"
            label: "Conversations"
          - value: "£200k"
            label: "Divested to communities"
          - value: "2 million"
            label: "Isolated older people"
        quote:
          text: "“There’s nothing to do in my neighbourhood.”"
          caption: "The same sentence, in communities up and down the country. That isolation erodes community resilience, and it was the finding that set everything else in motion."
        problems:
          eyebrow: "What we learned"
          heading: "We found three big problems"
          people:
            kicker: "People"
            title: "People weren’t working together"
            image_alt: "Different institutions each building their own systems"
            body: "Every large institution was building its own community-information website, with different organisations gathering exactly the same data. This top-down approach was inefficient, missed whole swathes of small groups, and produced duplicate, low-quality listings rather than one really good one."
          software:
            kicker: "Software"
            title: "The existing software wasn’t working"
            image_alt: "An older person struggling to keep listings updated"
            body: "Community-information sites were either maintained on a group’s behalf by institutional staff, or required the groups themselves to log in and keep events updated. So groups re-entered the same information on site after site, on top of Facebook, Twitter and Instagram, for an ever-increasing workload and a tiny amount of publicity."
          skills:
            kicker: "Skills"
            title: "Tech skills were very low"
            image_alt: "A person unsure how to publish online"
            body: "Digital exclusion hits community groups hardest, particularly in deprived areas. Many groups had never published anything online at all, relying entirely on word of mouth, and missing out on connecting with new and enthusiastic participants. Staff at large institutions often felt just as left behind."
        turning:
          heading: "We needed to fix all of these together to have any impact."
          body: "That meant building a single package of software and training, with shared ownership, so that everyone could work together to build stronger communities."
          logo_alt: "PlaceCal"
        solutions:
          eyebrow: "What we built"
          heading: "One package, owned together"
          ownership:
            kicker: "Ownership"
            title: "Collective, not-for-profit ownership"
            image_alt: "Councils, organisers and residents around a shared map pin"
            body: "To be sustainable, everything is owned and managed directly by the institutions and community groups using it. PlaceCal supports the work already being done in neighbourhoods by partnerships of councils, community organisers and public-health services."
          technology:
            kicker: "Technology"
            title: "Software built on existing tools"
            image_alt: "Calendars and tools feeding into one place"
            body: "PlaceCal builds on the tools groups already use, like Google Calendar, Outlook 365 and Facebook. Those listings are converted into super-simple, highly accessible and constantly-updated calendars for each neighbourhood, community group and venue."
          people:
            kicker: "People"
            title: "A training programme that includes everyone"
            image_alt: "A training session bringing everyone along"
            body: "Our education programme walks institutions and community groups alike through the process of publishing and updating their information, so no one is left behind by the technology."
        cta:
          heading: "Set up PlaceCal in your community"
          button: "Get in touch"
    partners:
