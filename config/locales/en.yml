# Core English locale for PlaceCal
# Contains: ActiveRecord models/attributes, site metadata, and shared strings

en:
  # ===========================================================================
  # SITE METADATA
  # ===========================================================================

  meta:
    description: "%{site} is a community events calendar where you can find out everything that's happening, all in one place."

  colophon:
    year: "© 2019-%{year}"
    copyright: "GFSC Community Interest Company"
    company: "Registered in England and Wales #12135472"
    address: "5 Ribston Street, Manchester, M15 5RH"

  contact:
    email: "support@placecal.org"

  # ===========================================================================
  # DIRECTORY (public placecal.org)
  # ===========================================================================

  directory:
    breadcrumbs:
      root: "Directory"
    partners:
      index:
        filters:
          search: "Search"
          search_placeholder: "Name or keyword…"
          category: "Category"
          partnership: "Partnership"
          neighbourhood: "Neighbourhood"
          apply: "Filter"
          clear: "Clear"
          all_categories: "All categories"
          all_partnerships: "All partnerships"
          all_neighbourhoods: "All neighbourhoods"
          all_of: "All of %{name}"
      show:
        upcoming_events: "Upcoming events"
        location: "Location"
        accessibility_info: "Accessibility info"
        show_more_events:
          one: "Show 1 more event"
          other: "Show %{count} more events"
        serves: "Serves %{area}."
    partnerships:
      index:
        hero_title: "Partnerships on PlaceCal"
        hero_subtitle: "Discover local partnerships across the UK bringing communities together through PlaceCal. Each partnership runs its own calendar site, connecting the groups, events and services in their area."
        hero_kicker: "%{count} partnerships serving %{partners} partners"
        search_placeholder: "Search partnerships…"
        search_button: "Search"
        empty: "No partnerships found."
        clear_search: "Clear search"
      show:
        kicker: "Partnership"
        visit: "Visit %{url}"
        partners_heading: "Partners in this partnership"
        see_all_partners: "See all %{count} partners"
        upcoming_events: "Upcoming events"
        show_more_events:
          one: "Show 1 more event"
          other: "Show %{count} more events"
        see_all_events: "See all events"
        events_this_month:
          one: "%{count} event this month"
          other: "%{count} events this month"
        map_coming_soon: "Map coming soon"
        get_involved: "Get involved"
        cta_text: "Running a community group%{area}? Join this partnership to list your events."
        cta_area: " in %{name}"
        contact_coordinator: "Contact coordinator"
      card:
        kicker: "Partnership"
    sidebar:
      part_of: "Part of"
      partnerships:
        one: "%{count} partnership"
        other: "%{count} partnerships"
      partnerships_description: "You can find %{name} on these local PlaceCal sites:"
      opening_times: "Opening times"
      categories: "Categories"
      share_subscribe: "Share & subscribe"
      subscribe_ical: "Subscribe via iCal"
    contact:
      get_in_touch: "Get in touch"
      no_contact: "No contact information — let us know!"
    footer:
      tagline: "An open, community-run directory of local events and services near you."
      browse: "Browse"
      events: "Events"
      partners: "Partners"
      partnerships: "Partnerships"
      for_partners: "For partners"
      get_in_touch: "Get in touch"
      discord: "Chat on Discord"
      admin_log_in: "Admin log in"
      about: "About"
      our_story: "Our story"
      privacy_policy: "Privacy policy"
      terms_of_use: "Terms of use"
      build: "Build:"
      placecal_logo_alt: "PlaceCal logo"
      gfsc_logo_alt: "Geeks for Social Change"

  # ===========================================================================
  # DATE & TIME FORMATS
  # ===========================================================================

  date:
    formats:
      datetime: "%b %-d, %Y %l:%M"

  # ===========================================================================
  # ENUMERIZE (Calendar types)
  # ===========================================================================

  enumerize:
    calendar:
      type:
        google: "Google"
        outlook: "Outlook"
        mac_calendar: "Mac Calendar"
        facebook: "Facebook"
        other: "Other"
      strategy:
        place: "Place (default)"
        event_override: "Event override"
        event: "Event"
        room_number: "Room number"
        no_location: "No location"
        online_only: "Online only"

  # ===========================================================================
  # ACTIVERECORD
  # ===========================================================================

  activerecord:
    # -------------------------------------------------------------------------
    # Model names (singular/plural)
    # -------------------------------------------------------------------------
    models:
      article:
        one: "Article"
        other: "Articles"
      calendar:
        one: "Calendar"
        other: "Calendars"
      collection:
        one: "Collection"
        other: "Collections"
      event:
        one: "Event"
        other: "Events"
      neighbourhood:
        one: "Neighbourhood"
        other: "Neighbourhoods"
      partner:
        one: "Partner"
        other: "Partners"
      partnership:
        one: "Partnership"
        other: "Partnerships"
      site:
        one: "Site"
        other: "Sites"
      supporter:
        one: "Supporter"
        other: "Supporters"
      tag:
        one: "Tag"
        other: "Tags"
      user:
        one: "User"
        other: "Users"

    # -------------------------------------------------------------------------
    # Attributes (field labels)
    # -------------------------------------------------------------------------
    attributes:
      # Shared defaults - inherited by all models via YAML anchor
      defaults: &default_attrs
        name: "Name"
        email: "Email"
        phone: "Phone"
        description: "Description"
        summary: "Summary"
        slug: "Slug"
        url: "URL"
        website: "Website"
        address: "Address"
        city: "City"
        postcode: "Postcode"
        created_at: "Created"
        updated_at: "Updated"
        status: "Status"
        state: "State"
        role: "Role"
        theme: "Theme"
        tagline: "Tagline"
        logo: "Logo"
        image: "Image"

      address:
        <<: *default_attrs
        street_address: "Street Address"
        street_address_2: "Street Address 2"
        street_address_3: "Street Address 3"

      article:
        <<: *default_attrs
        title: "Title"
        body: "Body"

      calendar:
        <<: *default_attrs
        source: "Source URL"
        strategy: "Location Strategy"
        notices: "Import Notices"
        import_mode: "Import Mode"
        public_contact_name: "Contact Name"
        public_contact_email: "Contact Email"
        public_contact_phone: "Contact Phone"

      collection:
        <<: *default_attrs

      neighbourhood:
        <<: *default_attrs
        name_abbr: "Abbreviated Name"
        unit: "Unit"
        unit_name: "Unit Name"
        unit_code_key: "Unit Code Key"
        unit_code_value: "Unit Code Value"

      partner:
        <<: *default_attrs
        tag_ids: ""
        accessibility_info: "Accessibility Information"
        hidden_reason: "Reason for Hiding"
        facebook: "Facebook"
        twitter: "X (Twitter)"
        instagram: "Instagram"

      partnership:
        <<: *default_attrs

      site:
        <<: *default_attrs
        place_name: "Place Name"
        hero_text: "Hero Text"
        hero_image: "Hero Image"
        hero_image_alt: "Alt Text"
        hero_image_credit: "Image Credit"
        footer_logo: "Footer Logo"

      supporter:
        <<: *default_attrs

      tag:
        <<: *default_attrs
        type: "Type"
        system_tag: "System Tag"

      user:
        <<: *default_attrs
        first_name: "First Name"
        last_name: "Last Name"
        avatar: "Avatar"

    # -------------------------------------------------------------------------
    # Validation errors
    # -------------------------------------------------------------------------
    errors:
      template:
        header:
          one: "%{count} error prohibited this %{model} from being saved"
          other: "%{count} errors prohibited this %{model} from being saved"
      models:
        partner:
          attributes:
            tag_ids:
              blank: "Select at least one Tag"
