# Kamal 2 deployment configuration for PlaceCal
# See https://kamal-deploy.org/docs/configuration/overview/

service: placecal
image: ghcr.io/geeksforsocialchange/placecal

servers:
  web:
    hosts:
      - "%{DEPLOY_HOST}"
    options:
      memory: 512m
  job_worker:
    hosts:
      - "%{DEPLOY_HOST}"
    cmd: bin/rails jobs:work
    options:
      memory: 256m
  cron:
    hosts:
      - "%{DEPLOY_HOST}"
    cmd: bash -c "bundle exec whenever --update-crontab && cron -f"
    options:
      memory: 128m

proxy:
  ssl: true
  host: "%{SITE_DOMAIN}"
  app_port: 3000
  healthcheck:
    path: /up
    interval: 3
    timeout: 7
  response_timeout: 30
  buffering:
    requests: true
    responses: true
    max_request_body: 10_000_000 # 10MB — replaces nginx client_max_body_size

env:
  clear:
    RAILS_SERVE_STATIC_FILES: true
    RAILS_LOG_TO_STDOUT: true
  secret:
    - RAILS_ENV
    - RAILS_MASTER_KEY
    - SECRET_KEY_BASE
    - POSTGRES_HOST
    - POSTGRES_PORT
    - POSTGRES_DB
    - POSTGRES_USER
    - PGPASSWORD
    - MAILERSEND_USERNAME
    - MAILERSEND_PASSWORD
    - APPSIGNAL_PUSH_API_KEY
    - EVENTBRITE_TOKEN
    - SITE_DOMAIN

volumes:
  - "/data/placecal/uploads:/rails/public/uploads"

accessories:
  db:
    image: postgres:18
    host: "%{DEPLOY_HOST}"
    port: "127.0.0.1:5432:5432"
    env:
      secret:
        - POSTGRES_USER
        - POSTGRES_PASSWORD
        - POSTGRES_DB
    directories:
      - data:/var/lib/postgresql/data
    options:
      memory: 512m

asset_path: /rails/public/assets

builder:
  arch: amd64

# Database migrations run via bin/docker-entrypoint (db:prepare)
