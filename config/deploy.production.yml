# Production destination overrides
# Usage: kamal deploy -d production
#
# Set PRODUCTION_HOST in your environment or .kamal/secrets.production
<% begin; require "dotenv"; Dotenv.load(".kamal/secrets.production"); rescue LoadError; end %>

servers:
  web:
    hosts:
      - <%= ENV["PRODUCTION_HOST"] %>
  job_worker:
    hosts:
      - <%= ENV["PRODUCTION_HOST"] %>

# Cloudflare handles routing/SSL — list all hostnames served by this app
# Custom domains (e.g. queerleeds.lgbt) need adding here and redeploying
proxy:
  hosts:
    - placecal.org
    - "*.placecal.org"
    - www.queerleeds.lgbt

accessories:
  db:
    host: <%= ENV["PRODUCTION_HOST"] %>
