name: Test and maybe deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      destination:
        description: "Deploy destination"
        required: true
        default: staging
        type: choice
        options:
          - staging
          - production

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true
          cache-version: 3

      - uses: actions/setup-node@v6
        with:
          node-version-file: ".node-version"
          cache: yarn
      - run: yarn install --frozen-lockfile

      - name: Run linters
        run: |
          bin/yarn run format:check
          bundle exec rubocop

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true
          cache-version: 3

      - name: Run Brakeman
        run: bundle exec brakeman --no-pager

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        suite: [unit, system, cucumber-admin, cucumber-public]

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_PORT: 5432
          POSTGRES_DB: placecal_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: foobar
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      POSTGRES_USER: postgres
      PGPASSWORD: foobar
      RAILS_ENV: test
      CI: true

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true
          cache-version: 3

      - name: Install Imagemagick
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick

      - name: Install Chrome for browser tests
        if: matrix.suite == 'system' || startsWith(matrix.suite, 'cucumber')
        uses: browser-actions/setup-chrome@latest
        id: setup-chrome
        with:
          chrome-version: stable

      - uses: actions/setup-node@v6
        with:
          node-version-file: ".node-version"
          cache: yarn
      - run: yarn install --frozen-lockfile

      - name: Prepare database
        run: bin/rails db:test:prepare

      - name: Build assets
        run: |
          bin/yarn run build:all
          bin/rails dartsass:build

      - name: Verify compiled CSS is not empty
        run: |
          css_file="app/assets/builds/application.css"
          if [ ! -f "$css_file" ]; then
            echo "ERROR: No compiled application.css found in app/assets/builds/"
            exit 1
          fi
          size=$(wc -c < "$css_file")
          echo "application.css size: $size bytes"
          if [ "$size" -lt 10000 ]; then
            echo "ERROR: application.css is suspiciously small ($size bytes) — CSS compilation may have failed silently"
            exit 1
          fi

      - name: Precompile Rails assets
        if: matrix.suite == 'system' || startsWith(matrix.suite, 'cucumber')
        run: RAILS_ENV=test bin/rails assets:precompile

      - name: Run RSpec unit tests
        if: matrix.suite == 'unit'
        run: bundle exec rspec --exclude-pattern 'spec/system/**/*'

      - name: Run RSpec system tests
        if: matrix.suite == 'system'
        run: RUN_SLOW_TESTS=true bundle exec rspec spec/system
        env:
          BROWSER_PATH: ${{ steps.setup-chrome.outputs.chrome-path }}

      # Cucumber split into 2 parallel jobs by directory for faster CI
      - name: Run Cucumber features (admin)
        if: matrix.suite == 'cucumber-admin'
        run: bundle exec cucumber --tags "not @wip" features/admin
        env:
          BROWSER_PATH: ${{ steps.setup-chrome.outputs.chrome-path }}

      - name: Run Cucumber features (public)
        if: matrix.suite == 'cucumber-public'
        run: bundle exec cucumber --tags "not @wip" features/public features/authentication.feature
        env:
          BROWSER_PATH: ${{ steps.setup-chrome.outputs.chrome-path }}

      - name: Check database consistency
        if: matrix.suite == 'unit'
        run: RAILS_ENV=test bundle exec database_consistency

      - if: failure()
        name: Upload test screenshots
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: test-screenshots-${{ matrix.suite }}
          path: tmp/capybara/
          if-no-files-found: ignore

  # This job provides a single status check for branch protection rules
  # It runs on all PRs and pushes, unlike deploy which only runs on main/production
  ci:
    needs: [lint, security, test]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          if [ "${{ needs.lint.result }}" != "success" ] || [ "${{ needs.security.result }}" != "success" ] || [ "${{ needs.test.result }}" != "success" ]; then
            echo "lint result: ${{ needs.lint.result }}"
            echo "security result: ${{ needs.security.result }}"
            echo "test result: ${{ needs.test.result }}"
            exit 1
          fi
          echo "All checks passed!"

  deploy:
    needs: [lint, security, test]
    runs-on: ubuntu-latest
    if: >-
      github.repository == 'geeksforsocialchange/PlaceCal' &&
      (github.ref == 'refs/heads/main' || github.event_name == 'release' || github.event_name == 'workflow_dispatch')
    concurrency:
      group: deploy-${{ github.event_name == 'release' && 'production' || github.event.inputs.destination || 'staging' }}
      cancel-in-progress: false
    permissions:
      contents: read
      packages: write

    env:
      DOCKER_BUILDKIT: 1
      REGISTRY: ghcr.io

    steps:
      - uses: actions/checkout@v6

      - name: Set deploy destination
        id: dest
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "destination=production" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "destination=${{ github.event.inputs.destination }}" >> "$GITHUB_OUTPUT"
          else
            echo "destination=staging" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.KAMAL_REGISTRY_PASSWORD }}

      - uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true
          cache-version: 3

      - name: Set up SSH key
        uses: webfactory/ssh-agent@e83874834305fe9a4a2997156cb26c5de65a8555 # v0.10.0
        with:
          ssh-private-key: ${{ steps.dest.outputs.destination == 'production' && secrets.KAMAL_PRODUCTION_SSH_KEY || secrets.KAMAL_STAGING_SSH_KEY }}

      - name: Deploy with Kamal
        run: |
          gem install kamal -v '~> 2.10'
          kamal deploy -d ${{ steps.dest.outputs.destination }}
        env:
          # Kamal builds + pushes the Docker image to GHCR, then deploys to server
          KAMAL_REGISTRY_USERNAME: ${{ github.actor }}
          KAMAL_REGISTRY_PASSWORD: ${{ secrets.KAMAL_REGISTRY_PASSWORD }}
          # Server host (destination files use ERB to read these)
          STAGING_HOST: ${{ steps.dest.outputs.destination == 'staging' && secrets.STAGING_HOST || '' }}
          PRODUCTION_HOST: ${{ steps.dest.outputs.destination == 'production' && secrets.PRODUCTION_HOST || '' }}
          # Rails
          RAILS_ENV: ${{ steps.dest.outputs.destination == 'production' && 'production' || 'staging' }}
          SECRET_KEY_BASE: ${{ secrets.SECRET_KEY_BASE }}
          RAILS_MASTER_KEY: ${{ secrets.RAILS_MASTER_KEY }}
          SITE_DOMAIN: ${{ steps.dest.outputs.destination == 'production' && 'placecal.org' || 'placecal-staging.org' }}
          # Database
          POSTGRES_HOST: placecal-db
          POSTGRES_PORT: "5432"
          POSTGRES_DB: ${{ steps.dest.outputs.destination == 'production' && 'placecal_production' || 'placecal_staging' }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          # Services
          MAILERSEND_USERNAME: ${{ secrets.MAILERSEND_USERNAME }}
          MAILERSEND_PASSWORD: ${{ secrets.MAILERSEND_PASSWORD }}
          APPSIGNAL_PUSH_API_KEY: ${{ secrets.APPSIGNAL_PUSH_API_KEY }}
          EVENTBRITE_TOKEN: ${{ secrets.EVENTBRITE_TOKEN }}
          # SSL (Cloudflare Origin CA certificate — per-destination)
          SSL_CERTIFICATE_PEM: ${{ steps.dest.outputs.destination == 'production' && secrets.PRODUCTION_SSL_CERTIFICATE_PEM || secrets.STAGING_SSL_CERTIFICATE_PEM }}
          SSL_PRIVATE_KEY_PEM: ${{ steps.dest.outputs.destination == 'production' && secrets.PRODUCTION_SSL_PRIVATE_KEY_PEM || secrets.STAGING_SSL_PRIVATE_KEY_PEM }}
